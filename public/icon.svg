<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Bykea ki Sawari">
  <!-- full-bleed teal background → safe for platform "maskable" rounding -->
  <rect width="512" height="512" fill="#0b4f4a"/>
  <!-- halftone-ish glow -->
  <circle cx="256" cy="232" r="190" fill="#0d5b54"/>
  <!-- road stripes at the bottom -->
  <g fill="#ffc63d">
    <rect x="120" y="430" width="64" height="16" rx="8"/>
    <rect x="224" y="430" width="64" height="16" rx="8"/>
    <rect x="328" y="430" width="64" height="16" rx="8"/>
  </g>
  <!-- green Bykea-captain helmet (the game's motif) -->
  <circle cx="256" cy="236" r="142" fill="#02a64a" stroke="#063e29" stroke-width="12"/>
  <!-- visor -->
  <rect x="142" y="222" width="228" height="60" rx="30" fill="#0e2b3a" stroke="#063e29" stroke-width="8"/>
  <!-- visor shine -->
  <rect x="168" y="236" width="70" height="14" rx="7" fill="#5fd0ff" opacity="0.75"/>
  <!-- helmet gloss -->
  <ellipse cx="206" cy="166" rx="40" ry="22" fill="#fff6e0" opacity="0.35"/>
  <!-- chin guard -->
  <path d="M150 300 Q256 372 362 300 Q330 348 256 350 Q182 348 150 300 Z" fill="#018a3e"/>
  <!-- hot-pink sticker accent -->
  <circle cx="388" cy="120" r="20" fill="#ff2e88" stroke="#063e29" stroke-width="8"/>
</svg>
